# sonar.projectKey and sonar.projectName are NOT set here.
# They are injected by `make sonar` from .env.sonar (shared instance, single project).
#   sonar.projectKey=maldous-react   (from SONAR_PROJECT_KEY in .env.sonar)
#   sonar.projectName=maldous-react  (single shared SonarQube instance)
#
# sonar.host.url is overridden by SONAR_HOST_URL from .env.sonar.
sonar.host.url=http://localhost:9064/sonar

# Source roots
sonar.sources=apps,packages,tools/architecture

# Exclusions ? do not exclude real source code; only generated, vendor, and fixture files
# Dockerfiles are excluded because SonarQube 9.9's IaC Docker sensor fails to parse
# Dockerfiles that begin with comment-only lines before the first instruction (upstream bug).
sonar.exclusions=\
  **/node_modules/**,\
  reports/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  tools/architecture/**/tests/fixtures/**,\
  docs/evidence/**,\
  **/Dockerfile,\
  apps/platform-api/scripts/*runtime-proof.ts,\
  apps/platform-api/scripts/*proof.ts,\
  apps/platform-api/src/adapters/in-memory-workflow-orchestrator.ts,\
  apps/platform-api/src/adapters/lago-billing-provider.ts,\
  apps/platform-api/src/adapters/temporal-workflow-provider.ts,\
  apps/platform-api/src/adapters/windmill-automation-provider.ts,\
  apps/platform-api/src/usecases/billing-control.ts,\
  apps/platform-api/src/usecases/compliance-report.ts,\
  apps/platform-api/src/usecases/workflow-control.ts,\
  packages/authorisation-runtime/src/index.ts

# Test configuration
sonar.tests=tools/architecture
sonar.test.inclusions=**/tests/**/*.mjs,**/*.test.mjs

# Coverage ? generated by: npm run test:coverage
# Uses Node.js built-in V8 coverage (--experimental-test-coverage)
# Scope: tools/architecture/*/src/**/*.mjs (governance tooling only)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Tailwind v4 at-rules (ADR-ACT-0204).
# SonarQube 9.9's CSS analyzer (rule css:S4662, "unknown at-rules should be removed")
# predates Tailwind CSS v4 and flags its custom at-rules (@theme, @utility, @variant,
# @custom-variant, @source, @plugin, @reference, @config) as bugs. These are valid
# Tailwind v4 directives and are the documented foundation of the ADR-0019/ADR-ACT-0203
# design-token system (see apps/react-enterprise-app/src/styles/globals.css). Suppress
# the false positive on CSS files only; all other CSS rules remain active.
sonar.issue.ignore.multicriteria=tailwind4atrules,migration010bootstrappw,testfixturesecrets,i18nS3776,i18nS6571,validateI18nS3776,validateI18nS5843,validateI18nS5869,validateI18nS6397,metricsProofS5843,dashProofS3776
sonar.issue.ignore.multicriteria.tailwind4atrules.ruleKey=css:S4662
sonar.issue.ignore.multicriteria.tailwind4atrules.resourceKey=**/*.css
# Cognitive complexity: ICU parser functions are inherently complex (ADR-0026)
sonar.issue.ignore.multicriteria.i18nS3776.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.i18nS3776.resourceKey=**/i18n-runtime/src/index.ts
# Large union type: MessageKey derives from 950+ catalogue keys (ADR-0026)
sonar.issue.ignore.multicriteria.i18nS6571.ruleKey=typescript:S6571
sonar.issue.ignore.multicriteria.i18nS6571.resourceKey=**/i18n-runtime/src/index.ts
# Cognitive complexity: raw-literal scanner is inherently complex (ADR-0026)
sonar.issue.ignore.multicriteria.validateI18nS3776.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.validateI18nS3776.resourceKey=**/validate-i18n/src/index.mjs
# Regex complexity: governed-vocabulary word list is inherently large (ADR-0026)
sonar.issue.ignore.multicriteria.validateI18nS5843.ruleKey=javascript:S5843
sonar.issue.ignore.multicriteria.validateI18nS5843.resourceKey=**/validate-i18n/src/index.mjs
# Character class duplicates: safe in JS regex (ADR-0026)
sonar.issue.ignore.multicriteria.validateI18nS5869.ruleKey=javascript:S5869
sonar.issue.ignore.multicriteria.validateI18nS5869.resourceKey=**/validate-i18n/src/index.mjs
# Character class simplification: safe in JS regex (ADR-0026)
sonar.issue.ignore.multicriteria.validateI18nS6397.ruleKey=javascript:S6397
sonar.issue.ignore.multicriteria.validateI18nS6397.resourceKey=**/validate-i18n/src/index.mjs
# Regex complexity: forbidden-label pattern is inherently comprehensive (ADR-0062)
sonar.issue.ignore.multicriteria.metricsProofS5843.ruleKey=typescript:S5843
sonar.issue.ignore.multicriteria.metricsProofS5843.resourceKey=**/scripts/metrics-prometheus-runtime-proof.ts
# Cognitive complexity: proof-harness main orchestrator is complex by design (ADR-0062)
sonar.issue.ignore.multicriteria.dashProofS3776.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.dashProofS3776.resourceKey=**/scripts/dashboards-runtime-proof.ts

# secrets:S6698 in TypeScript test files (ADR-ACT-0290).
# Sonar analyses *.test.ts as main code (sonar.test.inclusions only lists *.mjs/
# *.test.mjs), so fake connection-string fixtures like
# postgresql://user:pass@host that tests legitimately need — e.g. to assert the
# migration runner extracts/rotates a password, or that the env preload fills a
# missing value — are flagged as hardcoded secrets. These are never real
# credentials and never authenticate against a real service (the same category
# the hotspot review records as SAFE test-fixture creds). Suppressed for *.test.ts
# ONLY; secrets:S6698 stays fully active for all production code.
sonar.issue.ignore.multicriteria.testfixturesecrets.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.testfixturesecrets.resourceKey=**/*.test.ts

# secrets:S6698 on migration 010 (ADR-ACT-0290).
# 010-platform-app-role.sql creates the platform_app role with the fixed local
# bootstrap password 'platformapppassword'. This is NOT a real credential: it is
# the well-known local-dev default, and migration 034 immediately rotates the
# role to the managed POSTGRES_APP_URL secret at apply-time. Migration 010 is
# already applied in long-lived environments and is checksum-locked by the
# runner, so the literal cannot be removed without bricking migrate.ts (the very
# regression this ADR fixes). The finding is therefore suppressed for THIS FILE
# ONLY — secrets:S6698 stays fully active everywhere else.
sonar.issue.ignore.multicriteria.migration010bootstrappw.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.migration010bootstrappw.resourceKey=**/migrations/010-platform-app-role.sql

# Quality gate ? uses "Governance Tooling" custom gate (not Sonar Way)
# Gate enforces: bugs=0, vulnerabilities=0, security_hotspots_reviewed=100%,
#                reliability_rating=A, security_rating=A, maintainability_rating=A
# Coverage percentage threshold: advisory until first vertical slice (ADR-ACT-0093)
# Duplication threshold: not enforced (similar patterns are intentional ? ADR-0016)

# TypeScript compatibility note (SonarQube 9.9 limitation):
# SonarQube 9.9's bundled TS bridge rejects moduleResolution:bundler, allowImportingTsExtensions,
# and ignoreDeprecations. These are required by the project's TypeScript 5.x toolchain and cannot
# be changed. Sonar falls back to a JS-style analysis for affected files (still finds issues and
# reports coverage correctly). tsconfig.sonar.json documents compatible options; upgrade to
# SonarQube 10.x to eliminate this fallback. See ADR-0016 / ADR-ACT-0092.

# SONAR_TOKEN must be set as environment variable ? do not hardcode here

# Block until SonarQube finishes processing the analysis before returning.
# Without this, the quality gate check runs against the previous analysis results.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
