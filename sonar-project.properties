# sonar.projectKey and sonar.projectName are NOT set here.
# They are injected by `make sonar` from .env.sonar (shared instance, single project).
#   sonar.projectKey=maldous-react   (from SONAR_PROJECT_KEY in .env.sonar)
#   sonar.projectName=maldous-react  (single shared SonarQube instance)
#
# sonar.host.url is overridden by SONAR_HOST_URL from .env.sonar.
sonar.host.url=http://localhost:9064/sonar

# Source roots
sonar.sources=apps,packages,tools/architecture

# Exclusions ? do not exclude real source code; only generated, vendor, and fixture files
# Dockerfiles are excluded because SonarQube 9.9's IaC Docker sensor fails to parse
# Dockerfiles that begin with comment-only lines before the first instruction (upstream bug).
sonar.exclusions=\
  **/node_modules/**,\
  reports/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  tools/architecture/**/tests/fixtures/**,\
  docs/evidence/**,\
  **/Dockerfile

# Test configuration
sonar.tests=tools/architecture
sonar.test.inclusions=**/tests/**/*.mjs,**/*.test.mjs

# Coverage ? generated by: npm run test:coverage
# Uses Node.js built-in V8 coverage (--experimental-test-coverage)
# Scope: tools/architecture/*/src/**/*.mjs (governance tooling only)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate ? uses "Governance Tooling" custom gate (not Sonar Way)
# Gate enforces: bugs=0, vulnerabilities=0, security_hotspots_reviewed=100%,
#                reliability_rating=A, security_rating=A, maintainability_rating=A
# Coverage percentage threshold: advisory until first vertical slice (ADR-ACT-0093)
# Duplication threshold: not enforced (similar patterns are intentional ? ADR-0016)

# TypeScript compatibility note (SonarQube 9.9 limitation):
# SonarQube 9.9's bundled TS bridge rejects moduleResolution:bundler, allowImportingTsExtensions,
# and ignoreDeprecations. These are required by the project's TypeScript 5.x toolchain and cannot
# be changed. Sonar falls back to a JS-style analysis for affected files (still finds issues and
# reports coverage correctly). tsconfig.sonar.json documents compatible options; upgrade to
# SonarQube 10.x to eliminate this fallback. See ADR-0016 / ADR-ACT-0092.

# SONAR_TOKEN must be set as environment variable ? do not hardcode here

# Block until SonarQube finishes processing the analysis before returning.
# Without this, the quality gate check runs against the previous analysis results.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
