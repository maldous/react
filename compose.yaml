name: react-platform

# Profile guide:
#   (none)           ? default: postgres, redis, clickhouse, minio, mailpit, otel-collector
#   web              ? platform-api BFF + react SPA (Caddy); wires the full app on :80
#   identity         ? keycloak + keycloak-postgres
#   cloud-mocks      ? localstack
#   external-mocks   ? wiremock for deterministic external HTTP API mocks
#   external-sonar   ? sonarqube + sonar-postgres (shared instance, react-sonar project)
#   external-sentry  ? full self-hosted Sentry 26.5.2 (shared instance, react-sentry project)
#
# Port map ? defaults shown; override any via .env (e.g. POSTGRES_PORT=5434):
#   POSTGRES_PORT=5433          REDIS_PORT=6379
#   CLICKHOUSE_HTTP_PORT=8124   CLICKHOUSE_NATIVE_PORT=9002
#   MINIO_API_PORT=9000         MINIO_CONSOLE_PORT=9001
#   MAILPIT_SMTP_PORT=1025      MAILPIT_UI_PORT=8025
#   OTEL_GRPC_PORT=4317         OTEL_HTTP_PORT=4318    OTEL_HEALTH_PORT=13133
#   SONAR_PORT=9064             KEYCLOAK_PORT=8090
#   LOCALSTACK_PORT=4566
#   WIREMOCK_PORT=8089          WEB_HTTP_PORT=80
#   PGADMIN_PORT=5050

services:
  # ---------------------------------------------------------------------------
  # DEFAULT PROFILE ? no profile selector; started by `docker compose up -d`
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-platformpassword}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
      # pgAdmin roles — non-superuser so RLS applies (init script creates them)
      PGADMIN_DB_PASSWORD: ${PGADMIN_DB_PASSWORD:-pgadmin-sysadmin-password}
      PGADMIN_TENANT_DB_PASSWORD: ${PGADMIN_TENANT_DB_PASSWORD:-pgadmin-tenant-password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-extra-databases.sh:/docker-entrypoint-initdb.d/init-extra-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform} -d ${POSTGRES_DB:-platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-platform}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhousepassword}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-platform}
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8124}:8123" # HTTP interface
      - "${CLICKHOUSE_NATIVE_PORT:-9002}:9000" # Native protocol
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse/enable-json-type.xml:/etc/clickhouse-server/users.d/enable-json-type.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopassword}
      # Redirect URL for MinIO console login — must match the path Caddy serves it on.
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://aldous.info/minio}
      # Keycloak OIDC SSO — MinIO console authenticates via platform Keycloak realm.
      # Users sign in with their Keycloak account; existing sessions auto-authenticate.
      MINIO_IDENTITY_OPENID_CONFIG_URL: ${KEYCLOAK_URL:-http://keycloak:8080/kc}/realms/${KEYCLOAK_REALM:-platform}/.well-known/openid-configuration
      MINIO_IDENTITY_OPENID_CLIENT_ID: minio
      MINIO_IDENTITY_OPENID_CLIENT_SECRET: ""
      # ADR-0073: MinIO maps this claim to a MinIO policy; the Keycloak minio client
      # emits policy=consoleAdmin for SSO'd operators (forward-auth gates the click-through).
      MINIO_IDENTITY_OPENID_CLAIM_NAME: policy
      MINIO_IDENTITY_OPENID_SCOPES: "openid,email,profile"
      MINIO_IDENTITY_OPENID_REDIRECT_URI_DYNAMIC_ALL: "on"
    ports:
      - "${MINIO_API_PORT:-9000}:9000" # S3-compatible API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # MinIO console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.21.0
    environment:
      # Serve Mailpit UI under /mailpit so Caddy can proxy it at /mailpit/*
      # --webroot sets the base path for all assets and API calls in the web UI.
      # MP_ROOT_URL is not the correct env var; MP_WEBROOT maps to --webroot flag.
      MP_WEBROOT: ${MAILPIT_ROOT_URL:-/mailpit}
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP
      - "${MAILPIT_UI_PORT:-8025}:8025" # Web UI
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8025/mailpit/api/v1/info >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317" # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318" # OTLP HTTP
      - "${OTEL_HEALTH_PORT:-13133}:13133" # health_check extension
    healthcheck:
      # otel/opentelemetry-collector-contrib:0.114.0 is a distroless image with
      # no shell, wget, or curl. Process-liveness check via binary exit code is
      # the only in-container check possible. The real readiness endpoint is the
      # health_check extension HTTP API exposed externally on host:13133.
      test: ["CMD", "/otelcol-contrib", "help"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # pgAdmin — PostgreSQL web admin UI, accessible at /pgadmin/ via Caddy forward_auth.
  # SCRIPT_NAME=/pgadmin tells pgAdmin its subpath so all assets resolve correctly.
  # OAuth2 SSO with Keycloak is configured via docker/pgadmin/config_local.py.
  # SERVER_MODE=True is required for OAuth2; after passing forward_auth, pgAdmin
  # redirects to Keycloak which recognises the existing session (SSO — no re-login).
  pgadmin:
    image: dpage/pgadmin4:8.14
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@aldous.info}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      SCRIPT_NAME: /pgadmin
      # Keycloak SSO config — read by docker/pgadmin/config_local.py
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080/kc}
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost/kc}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-platform}
      # Confidential OIDC client secret (ADR-0073) — matches the Keycloak pgadmin client.
      PGADMIN_OIDC_CLIENT_SECRET: ${PGADMIN_OIDC_CLIENT_SECRET:-}
      # RLS-aware role passwords — must match init-extra-databases.sh
      PGADMIN_DB_PASSWORD: ${PGADMIN_DB_PASSWORD:-pgadmin-sysadmin-password}
      PGADMIN_TENANT_DB_PASSWORD: ${PGADMIN_TENANT_DB_PASSWORD:-pgadmin-tenant-password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/config_local.py:/pgadmin4/config_local.py:ro
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/pgadmin/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # EXTERNAL-SONAR PROFILE — single shared instance; `make sonar-up`
  # Lives in compose project `react-sonar` (independent of per-env stacks),
  # mirroring the Sentry shared-service pattern. Started/stopped via
  # `docker/compose-wrapper.sh sonar --profile external-sonar`.
  # Has its own dedicated sonar-postgres so it survives per-env down/reset.
  # ---------------------------------------------------------------------------

  sonar-postgres:
    image: postgres:16.6-alpine
    profiles: [external-sonar]
    environment:
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonarpassword}
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
    volumes:
      - sonar-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar} -d ${SONAR_DB_NAME:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # sonar-auth-oidc plugin installer (ADR-0073). SonarQube community has NO native
  # OIDC; this drops the plugin jar into the shared extensions volume before SonarQube
  # starts. BEST-EFFORT: exits 0 even if the download fails (SonarQube still starts;
  # OIDC simply stays off) so the quality gate is never blocked. Pin/override the URL
  # to a version matching the SonarQube image via SONAR_OIDC_PLUGIN_URL.
  sonar-oidc-plugin:
    image: curlimages/curl:8.11.1
    profiles: [external-sonar]
    user: "0:0"
    volumes:
      - sonarqube-extensions:/ext
    entrypoint:
      - sh
      - -c
      - |
        mkdir -p /ext/plugins
        if [ "${COMPOSE_SSO_ENABLED:-false}" = "true" ] && ! ls /ext/plugins/sonar-auth-oidc-*.jar >/dev/null 2>&1; then
          curl -fsSL -o /ext/plugins/sonar-auth-oidc-plugin.jar \
            "${SONAR_OIDC_PLUGIN_URL:-https://github.com/vaulttec/sonar-auth-oidc/releases/download/v2.1.1/sonar-auth-oidc-plugin-2.1.1.jar}" \
            && echo "sonar-auth-oidc plugin installed" \
            || echo "WARN: sonar-auth-oidc download failed — SonarQube will start without OIDC"
        fi
        exit 0
    restart: "no"

  sonarqube:
    image: sonarqube:lts-community
    profiles: [external-sonar]
    depends_on:
      sonar-postgres:
        condition: service_healthy
      sonar-oidc-plugin:
        condition: service_completed_successfully
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-postgres:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonarpassword}
      # Disable ES bootstrap checks (required without vm.max_map_count sysctl)
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      # Route SonarQube's rolling logs (sonar/web/ce/es) to stdout so Alloy -> Loki
      # captures them, not just the thin entrypoint output (ADR-ACT-0284).
      SONAR_LOG_CONSOLE: "true"
      # Serve SonarQube under /sonar so Caddy / Vite can proxy it at <host>/sonar/*
      SONAR_WEB_CONTEXT: ${SONAR_WEB_CONTEXT:-/sonar}
      # ── App-login SSO via Keycloak OIDC (ADR-0073, sonar-auth-oidc plugin) ──
      # NOTE: the sonar-auth-oidc plugin's settings are camelCase (issuerUri,
      # clientId.secured, groupsSync.claimName, …). SonarQube maps SONAR_* env vars
      # to properties by LOWERCASING, so those settings CANNOT be set here — they
      # are written through the web API by scripts/sonar/provision-oidc.sh (run via
      # `make sonar-provision`), where they persist in the SonarQube DB volume.
      # Default credentials: admin / admin — managed by provision-token.sh (ADR-0072)
    ports:
      - "${SONAR_PORT:-9064}:9000"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -qO- http://localhost:9000${SONAR_WEB_CONTEXT:-/sonar}/api/system/status | grep -q "\"status\":\"UP\"" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      # default = the react-sonar project network (sonar-postgres link). sonar-bridge
      # is a shared external network so each env's Caddy can reach the shared SonarQube
      # for the /sonar clickthrough (mirrors sentry-bridge) — ADR-ACT-0282.
      default: {}
      sonar-bridge: {}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # IDENTITY PROFILE ? `docker compose --profile identity up -d keycloak`
  # ---------------------------------------------------------------------------

  keycloak-postgres:
    image: postgres:16.6-alpine
    profiles: [identity]
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakpassword}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: [identity]
    # Per-environment start mode (ADR-ACT-0281): dev/test default to start-dev for
    # fast iteration; staging/prod set KEYCLOAK_COMMAND=start (production mode) where
    # Authorization Services / UMA behave correctly (start-dev had a broken authz
    # ResourceServer on KC 26.2 — ADR-ACT-0280). Plain `start` auto-builds on boot.
    command: ${KEYCLOAK_COMMAND:-start-dev}
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloakpassword}
      # Security/audit event logging (ADR-ACT-0284): emit login/logout/token/admin
      # events to the console (-> Alloy -> Loki) via the jboss-logging events
      # listener. The realm enables events + the jboss-logging listener (Terraform
      # keycloak_realm_events). Without this the highest-value auth audit signal
      # exists only in the admin console Events tab, never in Loki.
      KC_LOG: "console"
      KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_SUCCESS_LEVEL: "info"
      KC_SPI_EVENTS_LISTENER_JBOSS_LOGGING_ERROR_LEVEL: "warn"
      # KC_HOSTNAME_STRICT: When true, Keycloak only accepts requests whose Host
      # header matches KC_HOSTNAME. Set to true so the token issuer (iss claim)
      # is locked to the public-facing URL.
      KC_HOSTNAME_STRICT: "true"
      # KC_HOSTNAME_BACKCHANNEL_DYNAMIC (KC 26 hostname-v2): the FRONTEND URLs (issuer,
      # authorization_endpoint) stay pinned to KC_HOSTNAME (public, for the browser + the
      # token iss), but the BACKCHANNEL endpoints advertised in the OIDC discovery doc
      # (token, jwks_uri, userinfo, introspection) resolve from the request host. So a
      # composed service that derives its endpoints from discovery over the Docker-internal
      # hostname (MinIO MINIO_IDENTITY_OPENID_CONFIG_URL; pgAdmin OAUTH2_SERVER_METADATA_URL)
      # gets CONTAINER-REACHABLE backchannel URLs. Without this, discovery returned the
      # PUBLIC URLs, which containers hit through Cloudflare and got HTTP 403 — MinIO's code
      # exchange failed ("No session") and pgAdmin's jwks fetch failed (ADR-0073). Replaces
      # the deprecated v1 KC_HOSTNAME_STRICT_BACKCHANNEL (ignored under hostname-v2).
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
      # Production `start` mode runs behind Cloudflare -> Caddy (TLS terminated at the
      # edge; Keycloak speaks HTTP internally). Trust the X-Forwarded-* headers so KC
      # resolves the original https scheme/host for issuer + redirect URLs. Harmless in
      # start-dev. (KC 26 hostname-v2 setting; replaces the old KC_PROXY=edge.)
      KC_PROXY_HEADERS: "xforwarded"
      KC_HEALTH_ENABLED: "true"
      # Tells Keycloak to generate all its URLs (login form actions, redirects, assets)
      # with /kc as the path prefix. This matches how Caddy exposes Keycloak externally.
      # Without this, Keycloak generates form actions at /realms/... (without /kc) causing
      # form submissions to fail because Caddy has no handler for /realms/*.
      KC_HTTP_RELATIVE_PATH: "/kc"
      # KC_HOSTNAME (v2) sets the frontend URL which determines the token issuer (iss claim).
      # Must match the public-facing URL (e.g. http://localhost/kc, http://dev.localhost/kc)
      # so the issuer matches what the browser sees. KC_HOSTNAME_STRICT_BACKCHANNEL=false
      # allows the BFF to call the token/userinfo endpoints directly on the Docker-internal
      # hostname (keycloak:8080) while Keycloak still uses the KC_HOSTNAME URL for the issuer.
      # Override via env: KC_HOSTNAME=http://dev.localhost/kc for Tilt dev mode.
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost/kc}
      KC_METRICS_ENABLED: "false"
      # Don't cache theme static resources (ADR-ACT-0156): emit no-cache so the platform
      # login CSS isn't pinned by browsers/CDN at Keycloak's otherwise-stable resource URL.
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8090}:8080"
    volumes:
      # Custom "platform" login theme (ADR-ACT-0157): keeps Keycloak invisible by
      # bouncing brokered-IdP failures back to the app /login. Read-only; start-dev
      # has theme caching off so edits are picked up (new themes need a KC restart).
      - ./docker/keycloak/themes:/opt/keycloak/themes:ro
    # mock-oidc now runs PER-ENV in this same project (react-<env>), so Keycloak
    # reaches the OIDC broker backchannel directly at the in-network service name
    # http://mock-oidc:8080 (MOCK_OIDC_INTERNAL_URL). host.docker.internal is kept
    # as a host-gateway escape hatch for host-published fixtures (ADR-ACT-0157).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # curl/wget are not in the Keycloak UBI9 image; use bash TCP.
      # Health is on the management port (9000), not the HTTP port (8080).
      # KC_HEALTH_ENABLED=true must be set for the endpoint to exist.
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && printf 'GET /kc/health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # IDENTITY-MOCKS PROFILE ? `docker compose --profile identity-mocks up -d mock-oidc`
  #
  # mock-oidc: NON-PRODUCTION upstream OIDC identity-provider fixture. Keycloak
  # brokers it as mock-google / mock-azure / mock-apple (ADR-ACT-0157).
  #
  # PER-ENV (not shared): one instance per project (react-dev/test/staging/prod),
  # each on its own host MOCK_OIDC_PORT (dev 9080 / test 9081 / staging 9082 /
  # prod 9083) emitting its own MOCK_OIDC_PUBLIC_URL issuer. A single
  # node-oidc-provider instance can only emit ONE issuer, so per-env instances let
  # all environments run concurrently. Keycloak (same project network) reaches the
  # backchannel (token/jwks/userinfo) at http://mock-oidc:8080/<provider>; the
  # browser uses the published MOCK_OIDC_PUBLIC_URL for authorize + the picker.
  #
  # GUARDRAIL: this profile must NEVER be started silently in staging/prod. It is
  # only valid there as an explicit, temporary pre-real-provider bootstrap
  # (AUTH_PROVIDER_MODE=mock + ALLOW_MOCK_IDP_IN_PROD_UNTIL_REAL_PROVIDERS=true),
  # which the BFF startup check logs loudly. WireMock is NOT an OIDC provider
  # (Keycloak runs a real auth-code flow and validates signed ID tokens with a
  # dynamic nonce). See docs/local-development/mock-identity.md.
  # ---------------------------------------------------------------------------

  mock-oidc:
    build:
      context: ./services/mock-oidc
      dockerfile: Dockerfile
    profiles: [identity-mocks]
    environment:
      PORT: "8080"
      MOCK_OIDC_PUBLIC_URL: ${MOCK_OIDC_PUBLIC_URL:-http://localhost:9080}
      MOCK_OIDC_REALM: ${KEYCLOAK_REALM:-platform}
      MOCK_OIDC_KC_BROKER_BASE: ${MOCK_OIDC_KC_BROKER_BASE:-http://localhost:8090/kc/realms/platform/broker}
      MOCK_OIDC_EXTRA_REDIRECT_URIS: ${MOCK_OIDC_EXTRA_REDIRECT_URIS:-}
      MOCK_OIDC_CLIENT_SECRET: ${MOCK_OIDC_CLIENT_SECRET:-mock-oidc-shared-secret}
    ports:
      # host:container ? host port MUST equal the port in MOCK_OIDC_PUBLIC_URL so
      # the browser-facing issuer and the published port agree. Per-env offset:
      # dev 9080 / test 9081 / staging 9082 / prod 9083 (set MOCK_OIDC_PORT in .env.<env>).
      - "${MOCK_OIDC_PORT:-9080}:8080"
    # Runs in this env's own project (react-<env>) alongside that env's Keycloak,
    # which reaches it in-network at http://mock-oidc:8080 (MOCK_OIDC_INTERNAL_URL).
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # CLOUD-MOCKS PROFILE ? `docker compose --profile cloud-mocks up -d localstack`
  # ---------------------------------------------------------------------------

  localstack:
    # SECURITY NOTE: This service mounts the Docker socket (/var/run/docker.sock).
    # This is a local-dev exception required by LocalStack for Lambda/ECS emulation.
    # It is profile-gated (cloud-mocks), never starts by default, and must not run
    # in CI unless separately reviewed and approved. Do not expose on shared hosts.
    image: localstack/localstack:4.0.4
    profiles: [cloud-mocks]
    environment:
      SERVICES: ${LOCALSTACK_SERVICES:-s3,sqs,sns,secretsmanager}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      DOCKER_HOST: unix:///var/run/docker.sock
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SECRETS PROFILE — `make compose-up-secrets` (docker compose --profile secrets)
  # OpenBao (open-source, Vault-compatible) central runtime secrets manager
  # (Tier-1 kernel, ADR-0069 / ADR-ACT-0265). Behind SecretStorePort; the built-in
  # Postgres store remains the durable default. Runs in -dev mode locally: a single
  # in-memory unsealed instance with a known root token — DEV/TEST ONLY. Production
  # requires a sealed, HA, auto-unsealed deployment with externalised credentials.
  # ---------------------------------------------------------------------------

  openbao:
    image: openbao/openbao:2.2.0
    profiles: [secrets]
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_TOKEN:-platform-dev-root-token}
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      BAO_ADDR: "http://127.0.0.1:8200"
    command: server -dev -dev-root-token-id=${OPENBAO_TOKEN:-platform-dev-root-token} -dev-listen-address=0.0.0.0:8200
    ports:
      - "${OPENBAO_PORT:-8200}:8200"
    healthcheck:
      test: ["CMD-SHELL", "bao status -address=http://127.0.0.1:8200 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SEARCH-PROVIDER PROFILE — `make compose-up-search-provider`
  # Meilisearch composed search provider (ADR-0071 / ADR-ACT-0271). Readiness is
  # live-proven behind ProviderReadinessProbe; the built-in Postgres FTS (ADR-0060)
  # remains the durable default search backend. Per-environment. DEV master key is
  # local-only (never a production key).
  # ---------------------------------------------------------------------------

  meilisearch:
    image: getmeili/meilisearch:v1.10
    profiles: [search-provider]
    environment:
      MEILI_ENV: ${MEILI_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-meili-dev-master-key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILITY-PROVIDER PROFILE — `make compose-up-observability-provider`
  # Composed metrics/traces/alert-routing backends (ADR-0071 / ADR-ACT-0271):
  # Prometheus (metrics), Tempo (traces), Alertmanager (alert routing). Readiness is
  # live-proven behind ProviderReadinessProbe; the built-in observability foundation
  # (ADR-0062) remains the default. Per-environment; env labels mandatory; no secrets
  # in labels/samples/spans. Distinct from the OTEL collector (default profile).
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [observability-provider]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  tempo:
    # In BOTH the standard observability stack (so it receives traces wherever
    # Loki/Grafana/Alloy run — ADR-ACT-0284) and the ADR-0071 provider group.
    image: grafana/tempo:2.6.0
    profiles: [observability, observability-provider]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "${TEMPO_HTTP_PORT:-3201}:3200"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles: [observability-provider]
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # EXTERNAL-SENTRY INFRASTRUCTURE — dedicated resources for the shared Sentry
  # instance. Never connected to per-environment postgres/redis/clickhouse.
  # ---------------------------------------------------------------------------

  sentry-postgres:
    image: postgres:16-alpine
    profiles: [external-sentry]
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentrypassword
      POSTGRES_DB: sentry
    volumes:
      - sentry-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  sentry-redis:
    image: redis:7-alpine
    profiles: [external-sentry]
    volumes:
      - sentry-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  sentry-clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    profiles: [external-sentry]
    environment:
      CLICKHOUSE_PASSWORD: sentrypassword
    volumes:
      - sentry-clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse/enable-json-type.xml:/etc/clickhouse-server/users.d/enable-json-type.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query='SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # EXTERNAL-SENTRY PROFILE — single shared instance; `docker compose --profile external-sentry up -d`
  # ---------------------------------------------------------------------------
  # Full self-hosted Sentry 26.5.2, errors-only mode (ADR-0017, ADR-ACT-0089).
  # Dedicated postgres, redis, clickhouse, kafka, memcached — never shares env resources.
  #
  # Service dependency chain:
  #   [postgres, redis, clickhouse, kafka] → sentry-migrate / sentry-snuba-migrate
  #     → sentry-web + snuba-api + sentry-relay
  #       → consumers + taskworker/scheduler/broker
  #
  # Config files mounted from docker/sentry/:
  #   sentry.conf.py  — Python overrides (database, cache, kafka, snuba wiring)
  #   config.yml      — Static YAML settings (mail, url-prefix, symbolicator off)
  #   relay.yml       — Relay event gateway config

  sentry-kafka:
    image: confluentinc/cp-kafka:7.6.6
    profiles: [external-sentry]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@sentry-kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://sentry-kafka:9092,CONTROLLER://sentry-kafka:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://sentry-kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_IN_SYNC_REPLICAS: "1"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_MESSAGE_MAX_BYTES: "50000000"
      KAFKA_SOCKET_REQUEST_MAX_BYTES: "50000000"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "50000000"
      # Stable cluster ID — must not change after first start (KRaft storage is
      # formatted with this ID on first boot; subsequent starts must match).
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - sentry-kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-topics --bootstrap-server sentry-kafka:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  sentry-memcached:
    image: memcached:1.6.26-alpine
    profiles: [external-sentry]
    restart: unless-stopped

  # One-shot: run Snuba ClickHouse migrations. Idempotent — skips already-applied.
  sentry-snuba-migrate:
    image: ghcr.io/getsentry/snuba:26.5.2
    profiles: [external-sentry]
    # No 'snuba' prefix — entrypoint is ./docker_entrypoint.sh which prepends it.
    command: migrations migrate --force
    depends_on:
      sentry-clickhouse:
        condition: service_healthy
      sentry-redis:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
    environment:
      SNUBA_SETTINGS: self_hosted
      CLICKHOUSE_HOST: sentry-clickhouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: sentrypassword
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    restart: "no"

  # One-shot: run Sentry postgres migrations and create admin user. Idempotent.
  sentry-migrate:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: >-
      /bin/bash -c "
        sentry upgrade --noinput &&
        (sentry createuser --email $$SENTRY_ADMIN_EMAIL --password $$SENTRY_ADMIN_PASSWORD --superuser --no-input 2>/dev/null || true)"
    depends_on:
      sentry-postgres:
        condition: service_healthy
      sentry-redis:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
      SENTRY_PORT: "9060"
      SENTRY_ADMIN_EMAIL: ${SENTRY_ADMIN_EMAIL:-admin@sentry.local}
      SENTRY_ADMIN_PASSWORD: ${SENTRY_ADMIN_PASSWORD:-admin}
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: "no"

  sentry-kafka-init:
    image: confluentinc/cp-kafka:7.6.6
    profiles: [external-sentry]
    depends_on:
      sentry-kafka:
        condition: service_healthy
    command: >-
      bash -c "
        for topic in ingest-events ingest-transactions ingest-attachments ingest-monitors ingest-replays events event-replacements snuba-commit-log snuba-metrics snuba-generic-metrics snuba-profiles; do
          kafka-topics --bootstrap-server sentry-kafka:9092 --create --if-not-exists --topic $$topic --partitions 1 --replication-factor 1;
        done"
    restart: "no"

  sentry-relay:
    image: ghcr.io/getsentry/relay:26.5.2
    profiles: [external-sentry]
    volumes:
      # Named volume so relay's managed-mode credentials (generated on first boot)
      # persist; the read-only config.yml bind-mount overlays the file inside it.
      - sentry-relay-data:/work/.relay
      - ./docker/sentry/relay.yml:/work/.relay/config.yml:ro
    depends_on:
      sentry-web:
        condition: service_healthy
    networks:
      # default = react-shared project net. sentry-bridge so each env's platform-api can
      # send events to the relay's ingest endpoint (sentry-relay:3000) — ADR-ACT-0285 5.5.
      default: {}
      sentry-bridge: {}
    restart: unless-stopped

  sentry-snuba-api:
    image: ghcr.io/getsentry/snuba:26.5.2
    profiles: [external-sentry]
    depends_on:
      sentry-snuba-migrate:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
    environment:
      SNUBA_SETTINGS: self_hosted
      CLICKHOUSE_HOST: sentry-clickhouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: sentrypassword
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
      UWSGI_MAX_REQUESTS: "10000"
      UWSGI_DISABLE_LOGGING: "true"
    restart: unless-stopped

  sentry-snuba-errors:
    image: ghcr.io/getsentry/snuba:26.5.2
    profiles: [external-sentry]
    command: >-
      rust-consumer --storage errors
      --consumer-group snuba-consumers
      --auto-offset-reset=latest
      --max-batch-time-ms 750
      --no-strict-offset-reset
    depends_on:
      sentry-snuba-migrate:
        condition: service_completed_successfully
      sentry-kafka-init:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
    environment:
      SNUBA_SETTINGS: self_hosted
      CLICKHOUSE_HOST: sentry-clickhouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: sentrypassword
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    restart: unless-stopped

  sentry-snuba-replacer:
    image: ghcr.io/getsentry/snuba:26.5.2
    profiles: [external-sentry]
    command: >-
      replacer --storage errors
      --auto-offset-reset=latest
      --no-strict-offset-reset
    depends_on:
      sentry-snuba-migrate:
        condition: service_completed_successfully
      sentry-kafka-init:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
      sentry-kafka:
        condition: service_healthy
    environment:
      SNUBA_SETTINGS: self_hosted
      CLICKHOUSE_HOST: sentry-clickhouse
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: sentrypassword
      DEFAULT_BROKERS: sentry-kafka:9092
      REDIS_HOST: sentry-redis
    restart: unless-stopped

  sentry-web:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: run web --bind 0.0.0.0:9000
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-snuba-migrate:
        condition: service_completed_successfully
      sentry-snuba-api:
        condition: service_started
      sentry-redis:
        condition: service_healthy
      sentry-memcached:
        condition: service_started
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
      SENTRY_PORT: "9060"
      SENTRY_URL_PREFIX: ${SENTRY_URL_PREFIX:-https://aldous.info/sentry}
    ports:
      - "9060:9000"
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    networks:
      default: {}
      sentry-bridge:
        aliases:
          - sentry-web
    healthcheck:
      # The official getsentry/sentry image does not ship curl/wget. Use Python
      # Use /api/0/ instead of /_health/ because FORCE_SCRIPT_NAME=/sentry in
      # sentry.conf.py causes granian's /_health/ to redirect (Django treats
      # "_health" as an org slug). /api/0/ is a Sentry API endpoint that returns
      # 200 without auth — works correctly regardless of SCRIPT_NAME.
      test:
        [
          "CMD-SHELL",
          'python -c ''import urllib.request; urllib.request.urlopen("http://localhost:9000/api/0/", timeout=5)''',
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped

  sentry-events-consumer:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: >-
      run consumer ingest-events
      --consumer-group ingest-consumer
      --healthcheck-file-path /tmp/health.txt
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-kafka-init:
        condition: service_completed_successfully
      sentry-kafka:
        condition: service_healthy
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: unless-stopped

  sentry-post-process-forwarder:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: >-
      run consumer --no-strict-offset-reset post-process-forwarder-errors
      --consumer-group post-process-forwarder
      --synchronize-commit-log-topic=snuba-commit-log
      --synchronize-commit-group=snuba-consumers
      --healthcheck-file-path /tmp/health.txt
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-kafka-init:
        condition: service_completed_successfully
      sentry-kafka:
        condition: service_healthy
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: unless-stopped

  sentry-taskbroker:
    image: ghcr.io/getsentry/taskbroker:26.5.2
    profiles: [external-sentry]
    depends_on:
      sentry-kafka:
        condition: service_healthy
      sentry-redis:
        condition: service_healthy
    environment:
      TASKBROKER_KAFKA_CLUSTER: sentry-kafka:9092
      TASKBROKER_REDIS_URL: redis://sentry-redis:6379/5
    restart: unless-stopped

  sentry-taskworker:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: >-
      run taskworker
      --rpc-host=sentry-taskbroker:50051
      --health-check-file-path=/tmp/health.txt
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
      sentry-taskbroker:
        condition: service_started
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
      SENTRY_PORT: "9060"
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: unless-stopped

  sentry-taskscheduler:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: run taskworker-scheduler
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
      sentry-taskbroker:
        condition: service_started
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
      SENTRY_PORT: "9060"
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: unless-stopped

  sentry-cleanup:
    image: ghcr.io/getsentry/sentry:26.5.2
    profiles: [external-sentry]
    command: >-
      /bin/bash -c "
        while true; do
          sleep 86400 &&
          sentry cleanup --days $${SENTRY_EVENT_RETENTION_DAYS} 2>&1;
        done
      "
    depends_on:
      sentry-migrate:
        condition: service_completed_successfully
      sentry-redis:
        condition: service_healthy
    environment:
      SENTRY_CONF: /etc/sentry
      SENTRY_SECRET_KEY: ${SENTRY_SECRET_KEY}
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentrypassword
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: "6379"
      KAFKA_BROKERS: sentry-kafka:9092
      SNUBA: http://sentry-snuba-api:1218
      SENTRY_PORT: "9060"
      SENTRY_EVENT_RETENTION_DAYS: "${SENTRY_EVENT_RETENTION_DAYS:-90}"
    volumes:
      - sentry-data:/data
      - ./docker/sentry:/etc/sentry:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILITY PROFILE ? `docker compose --profile observability up -d`
  #
  # Grafana Loki + Tempo + Grafana + Grafana Alloy for log/trace ingestion,
  # retention, and search (ADR-0032 / ADR-ACT-0284). Alloy discovers all
  # react-platform containers via Docker socket, parses Pino JSON stdout, and
  # forwards to Loki; the otel-collector forwards spans to Tempo (tempo:4318).
  # Tempo is in this profile (and started by `make compose-up-observability`) so
  # E2E trace-by-id correlation works at every stage (ADR-ACT-0285 closure).
  #
  # Usage:
  #   make compose-up-observability          # start Loki + Tempo + Grafana + Alloy
  #   http://localhost:${GRAFANA_PORT:-3000}  # Grafana UI (admin:admin by default)
  #   http://localhost:${LOKI_PORT:-3100}     # Loki API (internal; exposed for dev)
  #   http://localhost:${TEMPO_HTTP_PORT:-3201}/ready  # Tempo (traces; per-stage port)
  #
  # Grafana clickthrough:  http://aldous.info/grafana/
  #
  # Production note: replace loki-config.yaml filesystem storage with S3/MinIO
  # before accumulating significant log volume (see docker/loki/loki-config.yaml).
  # ---------------------------------------------------------------------------

  loki:
    image: grafana/loki:3.3.2
    profiles: [observability]
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [observability]
    ports:
      - "${GRAFANA_PORT:-3200}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
      # Serve Grafana under /grafana/ so Caddy can path-proxy it. ROOT_URL must be the
      # PUBLIC base (no internal :3000) — otherwise the OIDC redirect_uri becomes
      # https://host:3000/grafana/... and Keycloak rejects it (ADR-0073). Derived from
      # APP_BASE_URL so it is correct per environment (dev.localhost:8080, aldous.info, …).
      GF_SERVER_ROOT_URL: ${APP_BASE_URL:-http://localhost}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # ── App-login SSO via Keycloak OIDC (ADR-0073) — opt-in via COMPOSE_SSO_ENABLED ──
      # AUTH_URL is browser-facing (KC_HOSTNAME); TOKEN/API are backchannel (KEYCLOAK_URL).
      # Roles map from the realm-role "roles" claim (Keycloak grafana client mapper):
      # system-admin→Admin, tenant-admin→Editor, else Viewer ("properly permitted").
      GF_AUTH_GENERIC_OAUTH_ENABLED: ${COMPOSE_SSO_ENABLED:-false}
      GF_AUTH_GENERIC_OAUTH_NAME: "Platform SSO"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET:-}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${KC_HOSTNAME:-http://localhost/kc}/realms/${KEYCLOAK_REALM:-platform}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${KEYCLOAK_URL:-http://keycloak:8080/kc}/realms/${KEYCLOAK_REALM:-platform}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: ${KEYCLOAK_URL:-http://keycloak:8080/kc}/realms/${KEYCLOAK_REALM:-platform}/protocol/openid-connect/userinfo
      # Click-through is already forward-auth-gated to operators, so grant strong access:
      # system-admin → server admin (GrafanaAdmin); any other SSO'd operator → org Admin.
      # STRICT=false so a missing/empty roles claim falls back to Admin instead of denying.
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(roles[*], 'system-admin') && 'GrafanaAdmin' || 'Admin'"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "false"
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "true"
      # Full-SSO: skip Grafana's own login page and redirect straight to Keycloak when
      # SSO is on (break-glass basic login still reachable at /login?disableAutoLogin).
      # The earlier ERR_TOO_MANY_REDIRECTS loop here was NOT a Grafana problem — Caddy's
      # `copy_headers Cookie` in (forward_auth_check) was stripping the browser Cookie
      # before it reached Grafana, so the OAuth state cookie never arrived. Fixed in the
      # Caddyfile; seamless auto-login works again (ADR-ACT-0285 Phase 6).
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: ${COMPOSE_SSO_ENABLED:-false}
      GF_AUTH_OAUTH_AUTO_LOGIN: ${COMPOSE_SSO_ENABLED:-false}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.5.1
    profiles: [observability]
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "${ALLOY_PORT:-12345}:12345"
    environment:
      PLATFORM_ENV: ${PLATFORM_ENV:-development}
      # Per-environment container discovery filter — set in .env.<env> files.
      # Regex matching com.docker.compose.project label to isolate this env's logs.
      # dev: "react(-dev)?"  test: "react-test"  staging: "react-staging"  prod: "react-prod"
      COMPOSE_PROJECT_FILTER: ${COMPOSE_PROJECT_FILTER:-react}
    volumes:
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # WEB PROFILE ? `docker compose --profile web up -d`
  #
  # Delivers the full platform on :80 ? no system services required.
  # platform-api: Node 25 BFF; runs migrations+seed then serves /api /auth /healthz
  # react-app:    Multi-stage Vite build ? Caddy static SPA + API reverse proxy
  #
  # ADR-0001: hexagonal architecture ? adapters own external integrations
  # ADR-0017: profile-gated; every service has a healthcheck
  # ADR-0022: BFF session model; HTTP-only cookie; fixture session for demo
  # ---------------------------------------------------------------------------

  platform-api:
    build:
      context: .
      dockerfile: apps/platform-api/Dockerfile
    profiles: [web]
    environment:
      NODE_ENV: production
      # AES-256-GCM key for session token encryption. Must be a 64-char hex string (32 bytes).
      # Set in .env.{dev,test,staging,prod}. Required at startup in production (PLATFORM_ENV=production).
      TENANT_SECRET_ENCRYPTION_KEY: ${TENANT_SECRET_ENCRYPTION_KEY:-}
      PLATFORM_API_PORT: "3001"
      # Superuser URL — used only by migration runner, seed, and reset scripts.
      POSTGRES_URL: postgresql://${POSTGRES_USER:-platform}:${POSTGRES_PASSWORD:-platformpassword}@postgres:5432/${POSTGRES_DB:-platform}
      # Non-superuser app role URL — runtime pool (ADR-ACT-0189). Set POSTGRES_APP_PASSWORD to a strong value in production.
      POSTGRES_APP_URL: postgresql://platform_app:${POSTGRES_APP_PASSWORD:-platformapppassword}@postgres:5432/${POSTGRES_DB:-platform}
      REDIS_URL: redis://redis:6379
      # Leave empty (default) to require real Keycloak login.
      # Set to a fixture role for dev without Keycloak: tenant-admin, viewer, no-membership
      # Example: LOCAL_FIXTURE_SESSION=tenant-admin make compose-up-web
      LOCAL_FIXTURE_SESSION: ${LOCAL_FIXTURE_SESSION:-}
      # debug ? shows all auth/session/tenant/provisioning operations. Set to info in prod.
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # SESSION_COOKIE_SECURE defaults false for local HTTP Compose.
      # Set SESSION_COOKIE_SECURE=true in .env when behind HTTPS/Cloudflare.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      PLATFORM_API_URL: ${PLATFORM_API_URL:-http://localhost}
      # Forward auth secret ? must match CADDY_INTERNAL_SECRET in react-app.
      # Prevents external callers from reaching /internal/auth/forward. ADR-0031.
      CADDY_INTERNAL_SECRET: ${CADDY_INTERNAL_SECRET:-}
      # Apex domain for FQDN-based tenant slug resolution (ADR-0029, ADR-0031).
      APEX_DOMAIN: ${APEX_DOMAIN:-aldous.info}
      # LOCAL routing probe target (ADR-ACT-0232): the in-cluster Caddy (react-app)
      # is probed with Host=<custom domain> to prove routing_local_active.
      DOMAIN_ROUTING_PROBE_BASE_URL: ${DOMAIN_ROUTING_PROBE_BASE_URL:-http://react-app}
      # SESSION_COOKIE_DOMAIN must match APEX_DOMAIN so the platform_session cookie
      # is sent to all subdomains (e.g. sentry.aldous.info for forward_auth checks).
      # Domain=aldous.info means the cookie travels to every *.aldous.info; the
      # pipeline's FQDN cross-check (canAccessTenantFqdn) prevents cross-tenant data access.
      SESSION_COOKIE_DOMAIN: ${APEX_DOMAIN:-aldous.info}
      # Keycloak ? internal Docker hostname for server-side calls (token exchange, JWKS, provisioning).
      # The browser redirect URL is derived from APP_BASE_URL + /kc (via Caddy path prefix).
      # /kc suffix matches KC_HTTP_RELATIVE_PATH set in the keycloak service.
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080/kc}
      # Public URL for browser-facing OAuth redirects ? via Caddy /kc path prefix.
      # The BFF uses KEYCLOAK_URL for internal token exchange; KEYCLOAK_PUBLIC_URL for
      # the auth URL the browser navigates to (Authorization Code redirect).
      # KEYCLOAK_PUBLIC_URL: override only if the host-derived URL is wrong for your setup.
      # By default, platform-api derives the public Keycloak URL from the request Host header,
      # so all tenants and vanity domains work without any config change (ADR-0029 ?2b).
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-platform}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-platform-api}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-local-dev-bff-secret}
      KEYCLOAK_PROVISIONER_CLIENT_ID: ${KEYCLOAK_PROVISIONER_CLIENT_ID:-platform-provisioner}
      KEYCLOAK_PROVISIONER_CLIENT_SECRET: ${KEYCLOAK_PROVISIONER_CLIENT_SECRET:-local-dev-provisioner-secret}
      # Brokered third-party identity provider mode (ADR-ACT-0157). Read by the BFF
      # (apps/platform-api/src/server/auth-providers.ts). Unset => "real" in prod-like
      # envs (PLATFORM_ENV=staging|prod), which lists ONLY the platform login until
      # real providers exist. "mock" is a TEMPORARY pre-real-provider bootstrap and
      # ALSO requires ALLOW_MOCK_IDP_IN_PROD_UNTIL_REAL_PROVIDERS=true, or the BFF
      # refuses to start (validateProviderModeAtStartup). MOCK_OIDC_* point the BFF
      # seed at the shared mock-oidc fixture (browser issuer vs Keycloak backchannel).
      AUTH_PROVIDER_MODE: ${AUTH_PROVIDER_MODE:-}
      ALLOW_MOCK_IDP_IN_PROD_UNTIL_REAL_PROVIDERS: ${ALLOW_MOCK_IDP_IN_PROD_UNTIL_REAL_PROVIDERS:-}
      MOCK_OIDC_PUBLIC_URL: ${MOCK_OIDC_PUBLIC_URL:-http://localhost:9080}
      MOCK_OIDC_INTERNAL_URL: ${MOCK_OIDC_INTERNAL_URL:-http://mock-oidc:8080}
      MOCK_OIDC_CLIENT_SECRET: ${MOCK_OIDC_CLIENT_SECRET:-mock-oidc-shared-secret}
      # Loki base URL for the admin log search API (ADR-0035, ADR-ACT-0194).
      # Hardcoded internal Docker hostname (like POSTGRES_URL/REDIS_URL above): each
      # compose project (react-dev/test/staging/prod) has its own `loki` service on
      # internal port 3100, so this is correct and isolated per environment. The
      # host-perspective LOKI_URL in .env.<env> (localhost:<offset>) is NOT used
      # here — it is for the host-run dev BFF (Tilt) and host smoke tests.
      LOKI_URL: http://loki:3100
      # Distributed tracing (ADR-ACT-0284): the NodeSDK (adapters-opentelemetry)
      # exports OTLP/HTTP to the collector, which forwards to Tempo. This is the
      # in-container service address (4318 = OTLP/HTTP) — the host-perspective
      # OTEL_EXPORTER_OTLP_ENDPOINT in .env.<env> (localhost) is for the host-run
      # dev BFF only, exactly like LOKI_URL above. Set OTEL_SDK_DISABLED=true to
      # turn tracing off without a redeploy.
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-platform-api}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      # Sentry error monitoring (ADR-0073 / ADR-ACT-0285 Phase 5.5). SENTRY_DSN points at
      # the in-cluster Sentry Relay over the sentry-bridge network (sentry-relay:3000) and
      # SENTRY_API_TOKEN are runtime-provisioned by scripts/sentry/provision-sentry.sh; the
      # adapter sets environment=PLATFORM_ENV, release=APP_VERSION, and reports only when
      # SENTRY_ENABLED=true with a non-empty DSN (observability.ts).
      PLATFORM_ENV: ${PLATFORM_ENV:-development}
      APP_VERSION: ${APP_VERSION:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}
      SENTRY_DSN: ${SENTRY_DSN:-}
      # Gated synthetic-failure endpoint — the Phase 5.5 assertion triggers it to prove a
      # captured error is queryable in Sentry. 404 unless enabled; in prod it ALSO requires
      # E2E_ALLOW_PROD_SYNTHETIC_FAILURE (defence in depth — synthetic-failure-endpoint test).
      E2E_FAILURE_ENDPOINT_ENABLED: ${E2E_FAILURE_ENDPOINT_ENABLED:-false}
      E2E_ALLOW_PROD_SYNTHETIC_FAILURE: ${E2E_ALLOW_PROD_SYNTHETIC_FAILURE:-false}
    ports:
      - "${PLATFORM_API_PORT:-3001}:3001"
    networks:
      # default = this env's project network. sentry-bridge lets platform-api reach the
      # SHARED Sentry Relay (sentry-relay:3000) to send events (mirrors react-app's bridge).
      default: {}
      sentry-bridge: {}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz | grep -q status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  react-app:
    # Multi-stage: Vite build ? Caddy serving SPA + proxying to platform-api
    # See apps/react-enterprise-app/Dockerfile and docker/caddy/Caddyfile
    build:
      context: .
      dockerfile: apps/react-enterprise-app/Dockerfile
    profiles: [web]
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    environment:
      # Shared with platform-api so forward_auth can validate the caller is Caddy. ADR-0031.
      CADDY_INTERNAL_SECRET: ${CADDY_INTERNAL_SECRET:-}
    extra_hosts:
      # Allows Caddy to reach host-machine services (e.g. Tilt UI on :10350).
      # host-gateway resolves to the host's Docker bridge IP automatically.
      - "host-gateway:host-gateway"
    networks:
      default: {}
      sentry-bridge: {}
      sonar-bridge: {}
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # EXTERNAL WEB PROFILE ? `docker compose --profile external-web up -d external-caddy`
  #
  # External-facing Caddy on host port 80 ? receives Cloudflare-terminated
  # HTTP traffic (Flexible SSL) and routes by Host header:
  #   staging.aldous.info ??? localhost:82 (staging internal Caddy)
  #   aldous.info         ??? localhost:83 (prod internal Caddy)
  #
  # Uses host networking so it can reach per-environment internal Caddies
  # on their respective published host ports.
  # See docker/caddy/Caddyfile.external for route configuration.
  # ---------------------------------------------------------------------------

  external-caddy:
    image: caddy:2-alpine
    profiles: [external-web]
    network_mode: host
    volumes:
      - ./docker/caddy/Caddyfile.external:/etc/caddy/Caddyfile:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # EXTERNAL-MOCKS PROFILE ? `docker compose --profile external-mocks up -d wiremock`
  #
  # Deterministic simulation of external HTTP APIs for local dev and E2E.
  # Mappings committed under docker/wiremock/mappings/ represent safe fixtures
  # only ? no real customer payloads, secrets, tokens, or production samples.
  # Use this profile when developing or testing adapters that call external APIs.
  # WireMock must not be used to hide missing adapter contracts; it supplements them.
  #
  # ADR-0017: external-mocks profile, external HTTP API simulation.
  # ---------------------------------------------------------------------------

  wiremock:
    image: wiremock/wiremock:3.13.2-2-alpine
    profiles: [external-mocks]
    ports:
      - "${WIREMOCK_PORT:-8089}:8080"
    volumes:
      - ./docker/wiremock/mappings:/home/wiremock/mappings:ro
      - ./docker/wiremock/__files:/home/wiremock/__files:ro
    command:
      - "--global-response-templating"
      - "--disable-gzip"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/__admin/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

# ---------------------------------------------------------------------------
# VOLUMES ? all named; no anonymous volumes
# ---------------------------------------------------------------------------

networks:
  sentry-bridge:
    external: true
    name: sentry-bridge
  sonar-bridge:
    external: true
    name: sonar-bridge

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  minio-data:
  sonar-postgres-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  keycloak-postgres-data:
  localstack-data:
  sentry-data:
  sentry-kafka-data:
  sentry-postgres-data:
  sentry-redis-data:
  sentry-clickhouse-data:
  sentry-relay-data:
  pgadmin-data:
  loki-data:
  grafana-data:
