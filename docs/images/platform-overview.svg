<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise React platform overview</title>
  <desc id="desc">A layered architecture showing React, BFF API, domain, adapters, infrastructure, governance, and quality gates.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
    .soft { fill: #eef2ff; stroke: #475569; stroke-width: 2; rx: 14; }
    .infra { fill: #ecfeff; stroke: #475569; stroke-width: 2; rx: 14; }
    .gate { fill: #fefce8; stroke: #475569; stroke-width: 2; rx: 14; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620" />
  <text class="text title" x="48" y="54">Platform shape</text>
  <text class="text small" x="48" y="82">The React app stays browser-only. Server, domain, adapters, infrastructure, and governance each have a clear owner.</text>

  <rect class="panel" x="40" y="116" width="1040" height="410" />

  <rect class="box" x="80" y="170" width="190" height="96" />
  <text class="text label" x="110" y="207">React SPA</text>
  <text class="text small" x="110" y="234">Vite, TanStack,</text>
  <text class="text small" x="110" y="254">React Aria, Tailwind</text>

  <rect class="box" x="330" y="170" width="190" height="96" />
  <text class="text label" x="364" y="207">BFF / API</text>
  <text class="text small" x="364" y="234">sessions, guards,</text>
  <text class="text small" x="364" y="254">safe responses</text>

  <rect class="soft" x="580" y="170" width="190" height="96" />
  <text class="text label" x="620" y="207">Domain</text>
  <text class="text small" x="620" y="234">use cases, rules,</text>
  <text class="text small" x="620" y="254">ports, validation</text>

  <rect class="infra" x="830" y="170" width="190" height="96" />
  <text class="text label" x="870" y="207">Adapters</text>
  <text class="text small" x="870" y="234">Postgres, Redis,</text>
  <text class="text small" x="870" y="254">Keycloak, OTel</text>

  <path class="line" d="M270 218 H320" />
  <path class="line" d="M520 218 H570" />
  <path class="line" d="M770 218 H820" />

  <rect class="gate" x="80" y="340" width="270" height="96" />
  <text class="text label" x="114" y="378">Architecture rules</text>
  <text class="text small" x="114" y="405">ADR decisions, package metadata,</text>
  <text class="text small" x="114" y="425">import boundaries, lifecycle gates</text>

  <rect class="gate" x="425" y="340" width="270" height="96" />
  <text class="text label" x="464" y="378">Quality gates</text>
  <text class="text small" x="464" y="405">format, lint, typecheck, tests,</text>
  <text class="text small" x="464" y="425">audit, security, coverage</text>

  <rect class="infra" x="770" y="340" width="250" height="96" />
  <text class="text label" x="812" y="378">Local substrate</text>
  <text class="text small" x="812" y="405">Compose, migrations, fixtures,</text>
  <text class="text small" x="812" y="425">Terraform/OpenTofu where needed</text>

  <path class="line" d="M215 340 V286" />
  <path class="line" d="M560 340 V286" />
  <path class="line" d="M895 340 V286" />

  <text class="text small" x="48" y="574">Rule of thumb: product code can move quickly because the boundaries are slow, explicit, and enforced.</text>
</svg>
