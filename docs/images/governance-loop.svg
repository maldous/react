<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">ADR governance loop</title>
  <desc id="desc">A loop from architecture decision records to package metadata, enforcement tooling, evidence, and future decisions.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; }
    .decision { fill: #eef2ff; stroke: #475569; stroke-width: 2; rx: 18; }
    .tool { fill: #ecfeff; stroke: #475569; stroke-width: 2; rx: 18; }
    .evidence { fill: #fefce8; stroke: #475569; stroke-width: 2; rx: 18; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .label { font-size: 18px; font-weight: 700; }
    .small { font-size: 14px; }
    .line { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="620" />
  <text class="text title" x="48" y="54">Governance loop</text>
  <text class="text small" x="48" y="82">Decisions do not sit apart from code. They create rules, tools enforce those rules, and evidence feeds the next decision.</text>

  <rect class="decision" x="80" y="150" width="240" height="100" />
  <text class="text label" x="128" y="188">ADR decision</text>
  <text class="text small" x="128" y="216">intent, trade-offs,</text>
  <text class="text small" x="128" y="236">accepted constraints</text>

  <rect class="box" x="440" y="150" width="240" height="100" />
  <text class="text label" x="486" y="188">Repository shape</text>
  <text class="text small" x="486" y="216">packages, metadata,</text>
  <text class="text small" x="486" y="236">schemas, source paths</text>

  <rect class="tool" x="800" y="150" width="240" height="100" />
  <text class="text label" x="852" y="188">Tooling</text>
  <text class="text small" x="852" y="216">orchestrator, import rules,</text>
  <text class="text small" x="852" y="236">metadata validation</text>

  <rect class="evidence" x="800" y="370" width="240" height="100" />
  <text class="text label" x="858" y="408">Evidence</text>
  <text class="text small" x="858" y="436">test results, reports,</text>
  <text class="text small" x="858" y="456">slice proof</text>

  <rect class="decision" x="440" y="370" width="240" height="100" />
  <text class="text label" x="488" y="408">Review</text>
  <text class="text small" x="488" y="436">ADR compliance, gaps,</text>
  <text class="text small" x="488" y="456">amendments</text>

  <rect class="box" x="80" y="370" width="240" height="100" />
  <text class="text label" x="128" y="408">Next decision</text>
  <text class="text small" x="128" y="436">builds on what is</text>
  <text class="text small" x="128" y="456">already proven</text>

  <path class="line" d="M320 200 H430" />
  <path class="line" d="M680 200 H790" />
  <path class="line" d="M920 250 V360" />
  <path class="line" d="M800 420 H690" />
  <path class="line" d="M440 420 H330" />
  <path class="line" d="M200 370 V274 Q200 250 224 250" />

  <text class="text small" x="80" y="548">The loop is deliberately conservative: new work should either follow the current rules or change the decision record first.</text>
</svg>
