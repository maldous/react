<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="600" viewBox="0 0 1120 600" role="img" aria-labelledby="title desc">
  <title id="title">Honest readiness — a running service is not a delivered capability</title>
  <desc id="desc">The controlled status vocabulary used to describe every capability honestly, from delivered through planned, with the rule that a running container alone is never counted as delivered.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .green { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
    .blue { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
    .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2; }
    .grey { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .lead { font-size: 15px; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 13px; }
    .quote { font-size: 18px; font-weight: 700; fill: #0f172a; }
  </style>
  <rect class="bg" width="1120" height="600" />
  <text class="text title" x="48" y="52">We only claim what we can prove</text>
  <text class="text lead" x="48" y="80">Every capability is described with one honest status. The word “complete” is deliberately not allowed.</text>

  <!-- The rule -->
  <rect class="panel" x="48" y="104" width="1024" height="84" rx="16" />
  <text class="text quote" x="72" y="140">A running service is not a delivered capability.</text>
  <text class="text small" x="72" y="168">A database running is not a data product. A dashboard running is not incident management. Proof — not presence — earns a status.</text>

  <!-- Status ladder -->
  <g>
    <rect class="green" x="48" y="214" width="320" height="92" rx="14" />
    <text class="text label" x="70" y="246">Delivered / locally proven</text>
    <text class="text small" x="70" y="272">Built, contracted, isolated, audited, and</text>
    <text class="text small" x="70" y="292">verified by a repeatable runtime proof.</text>

    <rect class="blue" x="400" y="214" width="320" height="92" rx="14" />
    <text class="text label" x="422" y="246">Partial</text>
    <text class="text small" x="422" y="272">Real machinery in place, with named gaps</text>
    <text class="text small" x="422" y="292">that are openly listed, never hidden.</text>

    <rect class="amber" x="752" y="214" width="320" height="92" rx="14" />
    <text class="text label" x="774" y="246">Planned / deferred</text>
    <text class="text small" x="774" y="272">Decided and designed, with a free local</text>
    <text class="text small" x="774" y="292">path — but not yet built. Stated plainly.</text>
  </g>

  <!-- Guarantees -->
  <text class="text label" x="48" y="356">Two promises behind every status</text>

  <rect class="grey" x="48" y="376" width="500" height="92" rx="14" />
  <text class="text label" x="70" y="408">Free to run locally</text>
  <text class="text small" x="70" y="434">No capability requires a paid account to run, test,</text>
  <text class="text small" x="70" y="454">or prove. Paid services appear only in production.</text>

  <rect class="grey" x="572" y="376" width="500" height="92" rx="14" />
  <text class="text label" x="594" y="408">Isolated by construction</text>
  <text class="text small" x="594" y="434">Tenant data is separated at every layer; shared</text>
  <text class="text small" x="594" y="454">tools are only shared when isolation is proven.</text>

  <!-- Footer -->
  <rect class="panel" x="48" y="492" width="1024" height="74" rx="16" />
  <text class="text label" x="72" y="524">Honesty is enforced, not promised</text>
  <text class="text small" x="72" y="550">An automated check rejects any claim that lacks a contract or proof — so the picture you read is the picture that is true.</text>
</svg>
