<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="660" viewBox="0 0 1120 660" role="img" aria-labelledby="title desc">
  <title id="title">Universal Service Foundation — capability domains</title>
  <desc id="desc">The fourteen capability domains of the Universal Service Foundation, grouped into a substrate that future products are built on, all sharing one disciplined pattern.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .core { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
    .build { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; }
    .compose { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
    .govern { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .lead { font-size: 15px; }
    .label { font-size: 16px; font-weight: 700; }
    .small { font-size: 12.5px; }
    .key { font-size: 13px; font-weight: 600; }
  </style>
  <rect class="bg" width="1120" height="660" />
  <text class="text title" x="48" y="52">One foundation, many capabilities</text>
  <text class="text lead" x="48" y="80">Fourteen capability domains sit on a single, shared discipline — so every product built on top inherits the same security, isolation, and honesty.</text>

  <!-- Products band -->
  <rect class="panel" x="48" y="104" width="1024" height="58" rx="14" />
  <text class="text label" x="72" y="140">Future SaaS products and enterprise applications</text>
  <text class="text small" x="640" y="140">build on the foundation — they never reinvent it</text>

  <!-- Capability domains grid -->
  <g>
    <rect class="core" x="48" y="186" width="240" height="74" rx="12" />
    <text class="text label" x="68" y="216">Identity &amp; access</text>
    <text class="text small" x="68" y="240">tenants, users, roles, policy, audit</text>

    <rect class="core" x="304" y="186" width="240" height="74" rx="12" />
    <text class="text label" x="324" y="216">Authentication</text>
    <text class="text small" x="324" y="240">SSO, IdP federation, MFA, sessions</text>

    <rect class="core" x="560" y="186" width="240" height="74" rx="12" />
    <text class="text label" x="580" y="216">Configuration</text>
    <text class="text small" x="580" y="240">typed settings, branding, domains, secrets</text>

    <rect class="build" x="816" y="186" width="256" height="74" rx="12" />
    <text class="text label" x="836" y="216">Billing &amp; entitlements</text>
    <text class="text small" x="836" y="240">plans, metering, quotas (planned)</text>

    <rect class="build" x="48" y="276" width="240" height="74" rx="12" />
    <text class="text label" x="68" y="306">Data platform</text>
    <text class="text small" x="68" y="330">storage, backup, governance, residency</text>

    <rect class="compose" x="304" y="276" width="240" height="74" rx="12" />
    <text class="text label" x="324" y="306">Search</text>
    <text class="text small" x="324" y="330">tenant-scoped product search (planned)</text>

    <rect class="build" x="560" y="276" width="240" height="74" rx="12" />
    <text class="text label" x="580" y="306">Storage</text>
    <text class="text small" x="580" y="330">isolated object storage, signed access</text>

    <rect class="compose" x="816" y="276" width="256" height="74" rx="12" />
    <text class="text label" x="836" y="306">Events &amp; workflows</text>
    <text class="text small" x="836" y="330">webhooks today, orchestration next</text>

    <rect class="build" x="48" y="366" width="240" height="74" rx="12" />
    <text class="text label" x="68" y="396">Compute runtime</text>
    <text class="text small" x="68" y="420">workers, jobs, runtime secrets</text>

    <rect class="build" x="304" y="366" width="240" height="74" rx="12" />
    <text class="text label" x="324" y="396">Observability &amp; ops</text>
    <text class="text small" x="324" y="420">logs, metrics, service health</text>

    <rect class="core" x="560" y="366" width="240" height="74" rx="12" />
    <text class="text label" x="580" y="396">Security &amp; governance</text>
    <text class="text small" x="580" y="420">isolation proof, compliance evidence</text>

    <rect class="compose" x="816" y="366" width="256" height="74" rx="12" />
    <text class="text label" x="836" y="396">Developer platform</text>
    <text class="text small" x="836" y="420">webhooks, API keys, portal (planned)</text>

    <rect class="build" x="48" y="456" width="496" height="74" rx="12" />
    <text class="text label" x="68" y="486">Support &amp; enterprise administration</text>
    <text class="text small" x="68" y="510">tenant lifecycle, break-glass, support desk</text>

    <rect class="govern" x="560" y="456" width="512" height="74" rx="12" />
    <text class="text label" x="580" y="486">Foundation governance (cross-cutting)</text>
    <text class="text small" x="580" y="510">scope, build-vs-compose, environment classification</text>
  </g>

  <!-- Shared discipline base -->
  <rect class="panel" x="48" y="552" width="1024" height="62" rx="14" />
  <text class="text label" x="72" y="580">Every capability shares one pattern</text>
  <text class="text small" x="72" y="602">a decision record · a contract · tenant isolation · permissions · audit · an honest readiness check · runtime proof · evidence</text>

  <!-- Legend -->
  <g>
    <rect class="core" x="48" y="630" width="18" height="18" rx="4" />
    <text class="text key" x="74" y="645">Delivered / proven core</text>
    <rect class="build" x="240" y="630" width="18" height="18" rx="4" />
    <text class="text key" x="266" y="645">Built in-house / partial</text>
    <rect class="compose" x="430" y="630" width="18" height="18" rx="4" />
    <text class="text key" x="456" y="645">Composed from open source</text>
    <rect class="govern" x="700" y="630" width="18" height="18" rx="4" />
    <text class="text key" x="726" y="645">Governance</text>
  </g>
</svg>
