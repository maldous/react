<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Authenticated organisation profile vertical slice flow</title>
  <desc id="desc">A request flow from React protected route through session, API guard, use case, domain validation, repository port, Postgres adapter, observability, and Playwright evidence.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; }
    .client { fill: #eef2ff; stroke: #475569; stroke-width: 2; rx: 14; }
    .server { fill: #ecfeff; stroke: #475569; stroke-width: 2; rx: 14; }
    .domain { fill: #f0fdf4; stroke: #475569; stroke-width: 2; rx: 14; }
    .evidence { fill: #fefce8; stroke: #475569; stroke-width: 2; rx: 14; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
    .title { font-size: 28px; font-weight: 700; }
    .label { font-size: 17px; font-weight: 700; }
    .small { font-size: 13px; }
    .line { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569" />
    </marker>
  </defs>
  <rect class="bg" width="1120" height="720" />
  <text class="text title" x="48" y="54">First vertical slice</text>
  <text class="text small" x="48" y="82">A small feature proves the full path from browser to database, plus security, validation, observability, and tests.</text>

  <rect class="client" x="70" y="130" width="210" height="80" />
  <text class="text label" x="104" y="164">React route</text>
  <text class="text small" x="104" y="188">protected UX check</text>

  <rect class="client" x="360" y="130" width="210" height="80" />
  <text class="text label" x="394" y="164">Feature hook</text>
  <text class="text small" x="394" y="188">TanStack Query + client</text>

  <rect class="server" x="650" y="130" width="210" height="80" />
  <text class="text label" x="688" y="164">BFF/API route</text>
  <text class="text small" x="688" y="188">session + permission guard</text>

  <path class="line" d="M280 170 H350" />
  <path class="line" d="M570 170 H640" />

  <rect class="server" x="650" y="270" width="210" height="80" />
  <text class="text label" x="690" y="304">Runtime context</text>
  <text class="text small" x="690" y="328">actor, tenant, requestId</text>

  <path class="line" d="M755 210 V260" />

  <rect class="domain" x="360" y="270" width="210" height="80" />
  <text class="text label" x="410" y="304">Use case</text>
  <text class="text small" x="410" y="328">dependency-injected port</text>

  <path class="line" d="M650 310 H580" />

  <rect class="domain" x="70" y="270" width="210" height="80" />
  <text class="text label" x="112" y="304">Domain rules</text>
  <text class="text small" x="112" y="328">validation, errors, contracts</text>

  <path class="line" d="M360 310 H290" />

  <rect class="server" x="70" y="420" width="210" height="80" />
  <text class="text label" x="110" y="454">Repository port</text>
  <text class="text small" x="110" y="478">interface owned by app/domain</text>

  <path class="line" d="M175 350 V410" />

  <rect class="server" x="360" y="420" width="210" height="80" />
  <text class="text label" x="398" y="454">Postgres adapter</text>
  <text class="text small" x="398" y="478">SQL and persistence mapping</text>

  <path class="line" d="M280 460 H350" />

  <rect class="box" x="650" y="420" width="210" height="80" />
  <text class="text label" x="704" y="454">Postgres</text>
  <text class="text small" x="704" y="478">local transactional data</text>

  <path class="line" d="M570 460 H640" />

  <rect class="evidence" x="190" y="570" width="300" height="80" />
  <text class="text label" x="236" y="604">Observability</text>
  <text class="text small" x="236" y="628">structured logs, trace context, safe errors</text>

  <rect class="evidence" x="610" y="570" width="300" height="80" />
  <text class="text label" x="678" y="604">Evidence</text>
  <text class="text small" x="678" y="628">unit, API, compose, frontend, E2E tests</text>

  <path class="line" d="M465 500 V548 Q465 560 450 570" />
  <path class="line" d="M755 500 V548 Q755 560 740 570" />
</svg>
