dev:
  executor: tilt
  dataPolicy: destructive
  buildMode: live
  authMode: fixture
  tenants: none
  teardownDefault: false # persistent — dev remains running after stage-dev
  requiredTests:
    - e2e-coverage-validate # ADR-0075 — registry coverage gate (no hidden/dishonest E2E coverage)
    - minimal-smoke
    - unit
    - e2e-smoke # runs make e2e-internal ENV=dev — reuses Tilt servers on 3001/5173
    # NOTE: the discovery suites (clickability/accessibility/persona-authz/persona-matrix)
    # target localhost:WEB_HTTP_PORT (the Caddy `web` profile) and persona-matrix asserts
    # clickthrough via Caddy forward-auth. The dev stage runs on Tilt (Vite :5173 / API
    # :3001) and deliberately does NOT start the compose `web` profile (run-stage.sh; dev
    # uses Tilt, not compose-up-web). So these are NOT Tilt-runnable on dev — they run at
    # test/staging/prod (which bring up the web profile) and remain fully registered in
    # e2e/suite-registry.json (stageMin: test). dev's environment-appropriate coverage is
    # the internal smoke + unit + registry gate. (ADR-0075 / ADR-ACT-0285)

test:
  executor: compose
  dataPolicy: destructive
  buildMode: containers
  authMode: fixture
  tenants: none
  teardownDefault: false # persistent — test remains running after stage-test
  requiredTests:
    - e2e-coverage-validate # ADR-0075 — registry coverage gate
    - unit # test:platform-api (254) + test:frontend:run (26) — full local suite
    - contract # test:architecture (638) — governance + package contracts
    - port # validate-compose-ports — no cross-env collisions
    - interface # compose-smoke.sh — docker container reachability
    - compose-smoke # compose-smoke.test.mjs — full integration smoke (resets DB)
    - e2e-smoke # make e2e-internal ENV=test — Playwright fixture session, isolated ports
    - e2e-clickability # ADR-ACT-0285 Phase 4 — crawl + quality-gate visible surfaces (fixture/safe)
    - e2e-accessibility # ADR-ACT-0285 Phase 6 — axe WCAG + structural a11y across routes x profiles
    - e2e-persona-authz # ADR-ACT-0285 Phase 6 — persona authorization permutation (deny/allow)
    - e2e-persona-matrix # ADR-ACT-0285 Phase 6 — multi-persona authed link/route/API matrix (sub-project A)
    - e2e-observability-correlation # ADR-ACT-0285 Phase 3 — E2E<->logs/traces correlation evidence (honest DEGRADED until specs propagate ids)
    - e2e-failure-rootcause # ADR-ACT-0285 Phase 5 — failure-path root-cause + Grafana/Loki label-policy evidence
    - e2e-sentry-assertion # ADR-ACT-0285 Phase 5.5 — self-hosted Sentry API event assertion (DEGRADED until Sentry API+token provisioned)

staging:
  executor: compose
  dataPolicy: preserve
  buildMode: production
  authMode: real
  tenants: none
  teardownDefault: false
  requiredTests:
    - e2e-coverage-validate # ADR-0075 — registry coverage gate
    - integration # run-stage-tests (unit-safe 206 + frontend 26) — no fixture-DB substrate
    - compose-smoke # compose-smoke.test.mjs DATA_POLICY=preserve — infra health, no resets
    - external-smoke # make e2e-external-smoke — 14 Playwright tests against localhost:82
    - e2e-clickability # ADR-ACT-0285 Phase 4 — crawl + quality-gate non-destructive surfaces
    - e2e-accessibility # ADR-ACT-0285 Phase 6 — axe WCAG + structural a11y across routes x profiles
    - e2e-persona-authz # ADR-ACT-0285 Phase 6 — persona authorization permutation (deny/allow)
    - e2e-persona-matrix # ADR-ACT-0285 Phase 6 — multi-persona authed link/route/API matrix (sub-project A)
    - auth-e2e # ADR-ACT-0285 — real-auth confidence gate; FAILS on missing creds, DEGRADED on localhost (never passes promotion)
    - e2e-observability-correlation # ADR-ACT-0285 Phase 3 — E2E<->logs/traces correlation evidence
    - e2e-failure-rootcause # ADR-ACT-0285 Phase 5 — failure-path root-cause + Grafana/Loki label-policy evidence
    - e2e-sentry-assertion # ADR-ACT-0285 Phase 5.5 — self-hosted Sentry API event assertion (DEGRADED until Sentry API+token provisioned)
  excludedTests:
    - tenant-data
    - destructive
    - production-customer-data

prod:
  executor: compose
  dataPolicy: preserve
  buildMode: production
  authMode: real
  tenants: real
  teardownDefault: false
  requiredTests:
    - e2e-coverage-validate # ADR-0075 — registry coverage gate
    - unit # test:platform-api (254, fixture-org present) + frontend
    - contract # test:architecture (638)
    - port
    - interface
    - integration # run-stage-tests (full 254 via NODE_ENV=production)
    - tenant # tenant-prod.spec.ts — skips unless PROD_BASE_URL=aldous.info
    - compose-smoke # DATA_POLICY=preserve
    - external-smoke # make e2e-external-smoke against localhost:83
    - e2e-clickability # ADR-ACT-0285 Phase 4 — crawl + quality-gate production-safe surfaces
    - e2e-accessibility # ADR-ACT-0285 Phase 6 — axe WCAG + structural a11y across routes x profiles
    - e2e-persona-authz # ADR-ACT-0285 Phase 6 — persona authorization permutation (deny/allow)
    - e2e-persona-matrix # ADR-ACT-0285 Phase 6 — multi-persona authed link/route/API matrix (sub-project A)
    - auth-e2e # FAILS if localhost — prod cannot silently skip auth confidence
    - production-e2e # npm run test:e2e:prod
    - e2e-observability-correlation # ADR-ACT-0285 Phase 3 — E2E<->logs/traces correlation evidence
    - e2e-failure-rootcause # ADR-ACT-0285 Phase 5 — failure-path root-cause + Grafana/Loki label-policy evidence
    - e2e-sentry-assertion # ADR-ACT-0285 Phase 5.5 — self-hosted Sentry API event assertion + prod no-unexpected-events gate
