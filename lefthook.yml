# lefthook.yml ? git hook runner
# https://lefthook.dev/configuration/
#
# Runs the same gates CI runs before every commit and push so failures are
# caught locally before they reach the remote.
#
# Install hooks once after cloning:
#   npx lefthook install
#
# Skip hooks when needed (use sparingly):
#   LEFTHOOK=0 git commit -m "..."
#
# ADR-0016: enterprise quality gate baseline.

pre-commit:
  parallel: false
  jobs:
    - name: format
      run: npm run format:check

    - name: lint
      run: npm run lint

    - name: typecheck
      run: npm run tsc:check

    - name: architecture
      run: node tools/architecture/orchestrator/src/index.mjs all --no-reports --strict

pre-push:
  parallel: false
  jobs:
    # unit-safe: unit tests + substrate tests that start their own servers
    # (api-pipeline, health-handlers, observability-smoke). No running Postgres
    # or Redis required — substrate tests use dependency injection / in-process
    # servers. Full test:platform-api (including fixture-DB substrate tests)
    # runs in CI and via 'make run-stage-tests' against a live environment.
    - name: platform-api-tests
      run: npm run test:platform-api:unit-safe

    - name: frontend-tests
      run: NODE_ENV=test npm run test:frontend:run
