# Platform login theme (ADR-ACT-0157 / ADR-ACT-0156).
#
# NON-INVASIVE override of the stock Keycloak login theme. Its sole purpose is to keep
# Keycloak invisible to end users: a brokered identity-provider failure (denied /
# cancelled / provider-error / disabled) is bounced back to the app's own /login with a
# friendly error code instead of rendering the Keycloak login page. Direct platform
# (username/password) login still renders inline, including its credential-error message.
parent=keycloak
import=common/keycloak
