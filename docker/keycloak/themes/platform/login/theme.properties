# Platform login theme (ADR-ACT-0157 / ADR-ACT-0156).
#
# Inherits the stock keycloak.v2 login theme (KC 26 default) for ALL styling — fonts,
# layout, colours, PatternFly CSS, macros (field/buttons/social-providers). The ONLY
# customization is in login.ftl / error.ftl: a brokered-IdP failure (denied / cancelled /
# provider-error / disabled) is bounced back to the app's own /login so Keycloak stays
# invisible. Direct platform username/password login renders the normal, fully-themed form.
parent=keycloak.v2
import=common/keycloak
# Load the stock keycloak.v2 stylesheet (resolved from the parent) first, then the
# platform brand overrides on top so the KC login looks like the app's /login.
styles=css/styles.css css/platform.css
