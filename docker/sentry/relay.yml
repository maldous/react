# docker/sentry/relay.yml — Relay 26.x configuration.
# Mounted read-only as /work/.relay/config.yml inside the relay container.
# Uses proxy mode: no credential generation required, events forwarded directly
# to sentry-web via HTTP. Suitable for self-hosted dev/staging/prod without
# the managed-mode credential registration step.
relay:
  upstream: "http://sentry-web:9000/"
  host: "0.0.0.0"
  port: 3000
  mode: proxy

logging:
  level: WARN
