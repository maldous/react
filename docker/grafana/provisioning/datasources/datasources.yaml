apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    uid: platform-loki
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: requestId
          matcherRegex: '"requestId":"([^"]+)"'
          url: "${__value.raw}"
          datasourceUid: platform-loki
        - name: traceId
          matcherRegex: '"traceId":"([^"]+)"'
          # Clicking a traceId in a log line opens the matching Tempo trace
          # (ADR-ACT-0284 — logs<->traces correlation).
          url: "${__value.raw}"
          datasourceUid: platform-tempo

  - name: Tempo
    type: tempo
    access: proxy
    uid: platform-tempo
    url: http://tempo:3200
    editable: false
    jsonData:
      # From a Tempo span, pivot to the Loki logs for the same trace.
      tracesToLogsV2:
        datasourceUid: platform-loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        customQuery: true
        query: '{service="$${__span.tags["service.name"]}"} |= "$${__trace.traceId}"'
      nodeGraph:
        enabled: true

  - name: Prometheus
    type: prometheus
    access: proxy
    uid: platform-prometheus
    url: http://prometheus:9090
    editable: false
    isDefault: false
    jsonData:
      timeInterval: 15s
