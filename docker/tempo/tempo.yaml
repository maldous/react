# Minimal local Tempo config (ADR-0071 / ADR-ACT-0271) — composed trace provider,
# readiness-probe target only. Single-binary, local filesystem backend. DEV/TEST: not
# a production topology (no object-store backend, no multitenancy headers wired here).
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
