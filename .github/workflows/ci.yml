name: Architecture governance and quality gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    name: Quality gates (format ? lint ? audit ? secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root devDependencies
        run: npm ci

      # --- Hard gates (fail fast) ---

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Markdown lint (markdownlint-cli2)
        run: npm run lint:md

      - name: ESLint
        run: npm run lint

      - name: Dependency audit (npm audit --audit-level=high)
        run: npm run audit:deps

      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2
        with:
          scan-args: |-
            --recursive
            .

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: TypeScript strict check
        run: npm run tsc:check

      - name: Docker Compose syntax check (default profile)
        run: npm run compose:config

      - name: Docker Compose syntax check (all profiles)
        run: npm run compose:config:all

      # --- Report-only gates (never fail the build) ---

      - name: Knip ? unused exports/deps (report only)
        run: npm run knip || true

      - name: Dependency cruiser ? graph smoke test (report only)
        run: npm run depcruise || true

  architecture-checks:
    name: Architecture governance checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install validate-package-metadata dependencies
        run: npm ci
        working-directory: tools/architecture/validate-package-metadata

      - name: Install validate-source-imports dependencies
        run: npm ci
        working-directory: tools/architecture/validate-source-imports

      - name: Run architecture governance checks
        run: node tools/architecture/orchestrator/src/index.mjs all --no-reports --strict

      - name: Run architecture tooling tests
        run: |
          node --test \
            tools/architecture/validate-package-metadata/tests/validate-package-metadata.test.mjs \
            tools/architecture/validate-source-imports/tests/validate-source-imports.test.mjs \
            tools/architecture/generate-package-readmes/tests/generate-package-readmes.test.mjs \
            tools/architecture/generate-package-inventory/tests/generate-package-inventory.test.mjs \
            tools/architecture/validate-lifecycle-evidence/tests/validate-lifecycle-evidence.test.mjs \
            tools/architecture/orchestrator/tests/self-evidence.test.mjs
